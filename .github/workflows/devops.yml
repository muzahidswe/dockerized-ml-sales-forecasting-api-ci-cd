name: Sales Prediction CI/CD

on:
  push:
    branches: [ "master" ] # when push to main branch it will run

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 1. Login to Docker Hub. 
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Image Build & Push (Node.js)
      - name: Build and Push Node.js Image
        run: |
          docker build -t muzahidswe/sales-node:latest ./node-service
          docker push muzahidswe/sales-node:latest

      # 3. Image Build & Push (Python/ML)
      - name: Build and Push Python Image
        run: |
          docker build -t muzahidswe/sales-python:latest ./python-service
          docker push muzahidswe/sales-python:latest
